<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Label Manager</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --border-color: #333333;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            margin-top: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        /* Kamera Buttons / Boxen */
        .capture-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .capture-box {
            position: relative;
            background-color: var(--bg-card);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .capture-box.has-image {
            border-style: solid;
            border-color: var(--border-color);
        }

        .capture-box input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .capture-box span {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
            pointer-events: none;
        }

        .capture-box svg {
            width: 32px;
            height: 32px;
            fill: var(--text-muted);
            pointer-events: none;
        }

        .preview-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            display: none;
        }

        /* Notizfeld */
        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
            border-radius: 0;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-bottom-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn-save {
            background-color: var(--accent);
            color: var(--bg-dark);
            border: none;
        }

        .btn-save:active {
            background-color: #cccccc;
        }

        .btn-delete {
            background-color: transparent;
            color: var(--text-main);
            border-color: var(--border-color);
            margin-top: 15px;
        }

        .btn-delete:active {
            background-color: #333333;
        }

        /* Listen-Ansicht */
        .task-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .task-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .task-images img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
            background-color: var(--bg-dark);
        }

        .task-note {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .task-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        #loadingState {
            display: none;
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Label Manager</h1>
    </header>

    <div class="container">
        
        <div class="section-title">Neue Erfassung</div>
        
        <div class="capture-grid">
            <div class="capture-box" id="boxLabel">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>
                <span id="textLabel">Label scannen</span>
                <input type="file" id="inputLabel" accept="image/*" capture="environment" onchange="handleImage(this, 'previewLabel', 'boxLabel', 'textLabel')">
                <img id="previewLabel" class="preview-img" alt="">
            </div>
            
            <div class="capture-box" id="boxArticle">
                <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.991.991 0 013 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15zM5 15.91l6 3.38v-6.71L5 9.19v6.72zm14 0v-6.72l-6 3.39v6.71l6-3.38z"/></svg>
                <span id="textArticle">Artikel scannen</span>
                <input type="file" id="inputArticle" accept="image/*" capture="environment" onchange="handleImage(this, 'previewArticle', 'boxArticle', 'textArticle')">
                <img id="previewArticle" class="preview-img" alt="">
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="inputNote" placeholder="Optionale Notiz (z.B. Name, Besonderheit)...">
        </div>

        <button class="btn btn-save" onclick="saveTask()">Speichern</button>
        <div id="loadingState">Verarbeite Bilder...</div>


        <div class="section-title">Offene Pakete</div>
        
        <div id="taskList">
            </div>

    </div>

    <script>
        // Datenbank Setup (IndexedDB)
        const dbName = "LabelAppDB_Single";
        const storeName = "tasks";
        let db;

        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadTasks();
        };

        request.onerror = function(event) {
            console.error("Datenbank Fehler:", event.target.error);
        };

        // Bildvorschau und Design-Anpassung nach Auswahl
        function handleImage(input, previewId, boxId, textId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(previewId);
                    img.src = e.target.result;
                    img.style.display = "block";
                    
                    document.getElementById(boxId).classList.add('has-image');
                    const textSpan = document.getElementById(textId);
                    textSpan.style.color = "var(--text-main)";
                    textSpan.style.backgroundColor = "rgba(0,0,0,0.6)";
                    textSpan.style.padding = "2px 8px";
                    textSpan.style.borderRadius = "4px";
                    textSpan.style.position = "absolute";
                    textSpan.style.bottom = "10px";
                    textSpan.style.zIndex = "3";
                    textSpan.innerText = "Ändern";
                }
                reader.readAsDataURL(file);
            }
        }

        // Bilder komprimieren (wichtig, damit das Handy nicht überlastet wird)
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > MAX_SIZE) {
                        height *= MAX_SIZE / width;
                        width = MAX_SIZE;
                    } else if (height > MAX_SIZE) {
                        width *= MAX_SIZE / height;
                        height = MAX_SIZE;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 60% Qualität
                    callback(canvas.toDataURL('image/jpeg', 0.6)); 
                }
            };
        }

        // Aufgabe in der Datenbank speichern
        function saveTask() {
            const labelInput = document.getElementById('inputLabel');
            const articleInput = document.getElementById('inputArticle');
            const noteInput = document.getElementById('inputNote').value.trim();
            const loading = document.getElementById('loadingState');

            if (labelInput.files.length === 0 || articleInput.files.length === 0) {
                alert("Bitte Label UND Artikel fotografieren.");
                return;
            }

            loading.style.display = "block";
            document.querySelector('.btn-save').style.display = "none";

            // Beide Bilder komprimieren und dann speichern
            compressImage(labelInput.files[0], function(labelB64) {
                compressImage(articleInput.files[0], function(articleB64) {
                    
                    const task = {
                        note: noteInput,
                        labelImg: labelB64,
                        articleImg: articleB64,
                        timestamp: Date.now()
                    };

                    const tx = db.transaction([storeName], "readwrite");
                    tx.objectStore(storeName).add(task);

                    tx.oncomplete = function() {
                        resetForm();
                        loadTasks();
                        loading.style.display = "none";
                        document.querySelector('.btn-save').style.display = "block";
                    };
                });
            });
        }

        // Eingabefelder nach dem Speichern leeren
        function resetForm() {
            document.getElementById('inputNote').value = "";
            document.getElementById('inputLabel').value = "";
            document.getElementById('inputArticle').value = "";
            
            document.getElementById('previewLabel').style.display = "none";
            document.getElementById('previewArticle').style.display = "none";
            
            document.getElementById('boxLabel').classList.remove('has-image');
            document.getElementById('boxArticle').classList.remove('has-image');

            const txtLabel = document.getElementById('textLabel');
            txtLabel.innerText = "Label scannen";
            txtLabel.style = "font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; pointer-events: none;";

            const txtArticle = document.getElementById('textArticle');
            txtArticle.innerText = "Artikel scannen";
            txtArticle.style = "font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; pointer-events: none;";
        }

        // Aufgaben laden und anzeigen
        function loadTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";

            const tx = db.transaction([storeName], "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();

            request.onsuccess = function(event) {
                const tasks = event.target.result;
                tasks.sort((a, b) => b.timestamp - a.timestamp); // Neueste oben

                if (tasks.length === 0) {
                    list.innerHTML = "<div class='empty-state'>Keine offenen Pakete. Alles erledigt!</div>";
                    return;
                }

                tasks.forEach(task => {
                    const date = new Date(task.timestamp);
                    const timeStr = date.getHours().toString().padStart(2, '0') + ':' + 
                                    date.getMinutes().toString().padStart(2, '0') + ' Uhr';

                    const card = document.createElement('div');
                    card.className = "task-card";
                    card.innerHTML = `
                        <div class="task-images">
                            <img src="${task.labelImg}" alt="Label">
                            <img src="${task.articleImg}" alt="Artikel">
                        </div>
                        ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
                        <div class="task-time">Erfasst um ${timeStr}</div>
                        <button class="btn btn-delete" onclick="deleteTask(${task.id})">VERPACKT & LÖSCHEN</button>
                    `;
                    list.appendChild(card);
                });
            };
        }

        // Aufgabe komplett aus der Datenbank löschen
        function deleteTask(id) {
            const tx = db.transaction([storeName], "readwrite");
            tx.objectStore(storeName).delete(id);
            tx.oncomplete = function() {
                loadTasks();
            };
        }
    </script>
</body>
</html>
